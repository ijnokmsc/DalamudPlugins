name: Build and Release Plugins

on:
  workflow_dispatch:
    inputs:
      craftflow_version:
        description: 'CraftFlow 版本号 (如 0.2.3.0)'
        required: false
        default: ''
      fatewhisper_version:
        description: 'FateWhisper 版本号 (如 0.2.0.0)'
        required: false
        default: ''
  push:
    paths:
      - 'pluginmaster.json'
      - '.github/workflows/build.yml'

jobs:
  # ============================================================
  # CraftFlow
  # ============================================================
  build-craftflow:
    runs-on: windows-latest
    steps:
      - name: Checkout DalamudPlugins
        uses: actions/checkout@v4
        with:
          path: dalamud-plugins

      - name: Checkout CraftFlow source
        uses: actions/checkout@v4
        with:
          repository: ijnokmsc/CraftFlow
          path: craftflow-src
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dalamud
        run: |
          # Download Dalamud SDK from XIVLauncherCN
          # This step may need adjustment based on available Dalamud distribution
          dotnet restore craftflow-src/CraftFlow/CraftFlow.csproj
        shell: pwsh

      - name: Build CraftFlow
        run: dotnet build craftflow-src/CraftFlow/CraftFlow.csproj -c Release --no-restore
        shell: pwsh

      - name: Pack CraftFlow
        run: |
          $version = "${{ inputs.craftflow_version }}"
          if (-not $version) { $version = "0.0.0.0" }
          $src = "craftflow-src/CraftFlow/bin/Release/CraftFlow"
          $out = "CraftFlow-$version.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $out
          echo "artifact=$out" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Upload CraftFlow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CraftFlow
          path: CraftFlow-*.zip

  # ============================================================
  # FateWhisper
  # ============================================================
  build-fatewhisper:
    runs-on: windows-latest
    steps:
      - name: Checkout DalamudPlugins
        uses: actions/checkout@v4
        with:
          path: dalamud-plugins

      - name: Checkout FateWhisper source
        uses: actions/checkout@v4
        with:
          repository: ijnokmsc/FateWhisper
          path: fatewhisper-src
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore FateWhisper
        run: dotnet restore fatewhisper-src/FateWhisper.csproj
        shell: pwsh

      - name: Build FateWhisper
        run: dotnet build fatewhisper-src/FateWhisper.csproj -c Release --no-restore
        shell: pwsh

      - name: Pack FateWhisper
        run: |
          $version = "${{ inputs.fatewhisper_version }}"
          if (-not $version) { $version = "0.0.0.0" }
          $src = "fatewhisper-src/bin/Release/FateWhisper"
          $out = "FateWhisper-$version.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $out
          echo "artifact=$out" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Upload FateWhisper artifact
        uses: actions/upload-artifact@v4
        with:
          name: FateWhisper
          path: FateWhisper-*.zip
